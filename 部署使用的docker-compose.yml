services:
  boot-manager:
    image: cakker/boot-manager:0.1.1
    container_name: boot-manager
    ports:
      - "8080:8000"
    environment:
      # 部署前建议在同目录 .env 里设置：ADMIN_KEY=换成你的管理密钥
      - ADMIN_KEY=${ADMIN_KEY:-change-me-before-deploy}
      # Docker 引擎启动 Boot-Manager 后，等待指定秒数再按顺序启动其他项目
      - BOOT_ON_START_DELAY_SECONDS=${BOOT_ON_START_DELAY_SECONDS:-30}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /docker:/docker
      - ./data:/app/data
    restart: always
